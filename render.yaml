services:
  - type: web
    name: forget-about-platform
    runtime: node
    plan: free
    buildCommand: npm install && npm run public-config
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: ALLOW_LIVE_STRIPE
        value: "false"
      - key: STRIPE_API_VERSION
        value: "2026-05-27.dahlia"
      - key: STRIPE_CURRENCY
        value: gbp
      - key: PRINT_BASE_PRICE_PENCE
        value: "800"
      - key: PRINT_PRICE_PER_CM3_PENCE
        value: "25"
      - key: MARKETPLACE_PLATFORM_FEE_PENCE
        value: "50"
      - key: MARKETPLACE_COMMISSION_PERCENT
        value: "10"
      - key: MARKETPLACE_VAT_PERCENT
        value: "20"
      - key: PLA_COST_PER_GRAM_PENCE
        value: "2"
      - key: PRINT_AUTO_COMPLETE_DAYS
        value: "14"
      - key: MARKETPLACE_QUOTE_MINUTES
        value: "30"
      - key: MARKETPLACE_INCLUDE_PENDING
        value: "false"
      - key: UNLIMITED_EXPORTS_PRICE_PENCE
        value: "500"
      - key: STRIPE_ALLOWED_COUNTRIES
        value: GB
      - key: CHECKOUT_ALLOWED_ORIGIN
        value: https://watsonjohn-spec.github.io
      - key: ACCOUNT_DEVICE_LIMIT
        value: "3"
      - key: ENFORCE_ACCOUNT_DEVICE_LIMIT
        value: "false"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: DOWNLOAD_TOKEN_SECRET
        generateValue: true
      - key: TASK_RUNNER_SECRET
        generateValue: true
      - key: ALLOW_PROTOTYPE_SECRET_FALLBACK
        value: "false"
