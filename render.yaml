services:
  - type: web
    name: forget-about-platform
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: ALLOW_LIVE_STRIPE
        value: "false"
      - key: STRIPE_API_VERSION
        value: "2026-02-25.clover"
      - key: STRIPE_CURRENCY
        value: gbp
      - key: PRINT_BASE_PRICE_PENCE
        value: "800"
      - key: PRINT_PRICE_PER_CM3_PENCE
        value: "25"
      - key: UNLIMITED_EXPORTS_PRICE_PENCE
        value: "500"
      - key: STRIPE_ALLOWED_COUNTRIES
        value: GB
      - key: ACCOUNT_DEVICE_LIMIT
        value: "3"
      - key: ENFORCE_ACCOUNT_DEVICE_LIMIT
        value: "false"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: DOWNLOAD_TOKEN_SECRET
        generateValue: true
